version: 0.2

env:
  variables:
    # Optional: Standardize your SAM template file name
    SAM_TEMPLATE: template.yaml

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Using Java 21
      - java -version
      - mvn -version
      - sam --version

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      # It's best practice to use the $ACCOUNT_ID variable instead of hardcoding the account number
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com

  build:
    commands:
      - echo Build started on `date`
      - export VERSION="1.0.${CODEBUILD_BUILD_NUMBER}"
      - echo "Version is set to $VERSION"
      
      # 1. Build the Java project (You can optionally let SAM handle this if your template.yaml is configured for it)
      - echo Building the Maven project...
      - mvn clean package dependency:copy-dependencies -DincludeScope=runtime -DskipTests
      
      # 2. Let SAM build the Docker container using your template.yaml and Dockerfile
      - echo Building SAM application...
      - sam build --template ${SAM_TEMPLATE}

  post_build:
    commands:
      - echo Packaging SAM application and pushing Docker image to ECR...
      # 3. sam package automatically pushes the built image to ECR and generates a new CloudFormation-ready template
      - sam package \
                --image-repository $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/$IMAGE_REPO_NAME \
                --s3-bucket krenzee-artifact-bucket \
                --output-template-file packaged.yaml

      - echo Build completed on `date`

# 4. Export the packaged template so CodePipeline (or the next step) can deploy it
artifacts:
  files:
    - packaged.yaml
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'