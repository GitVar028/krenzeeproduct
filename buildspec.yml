version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Using Java 21
      - java -version
      - mvn -version

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 937506435390.dkr.ecr.ap-southeast-1.amazonaws.com
  build:
    commands:
      - echo Build started on `date`
      - export VERSION="1.0.${CODEBUILD_BUILD_NUMBER}"
      - echo "Version is set to $VERSION"
      - echo Building the Maven project...
      - mvn clean package dependency:copy-dependencies -DincludeScope=runtime -DskipTests
      - echo Building Docker image...
      - docker build -t $IMAGE_REPO_NAME:$VERSION .

  post_build:
    commands:
      - echo Tagging Docker image...
      - docker tag $IMAGE_REPO_NAME:$VERSION $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/$IMAGE_REPO_NAME:$VERSION
      - docker tag $IMAGE_REPO_NAME:$VERSION $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/$IMAGE_REPO_NAME:latest
      - echo Pushing Docker image to ECR...
      - docker push $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/$IMAGE_REPO_NAME:$VERSION
      - docker push $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/$IMAGE_REPO_NAME:latest
      - echo Build completed on `date`
cache:
  paths:
    - '/root/.m2/**/*'