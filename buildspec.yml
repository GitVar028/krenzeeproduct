version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto21
  pre_build:
    commands:
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com
  build:
    commands:
      - mvn clean package dependency:copy-dependencies -DincludeScope=runtime -DskipTests
      - sam build
  post_build:
    commands:
      - echo "Packaging the SAM template..."
      # This command pushes the image to ECR and creates packaged.yaml
      - |
        sam package \
          --image-repository $ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/$IMAGE_REPO_NAME \
          --output-template-file $CODEBUILD_SRC_DIR/packaged.yaml
artifacts:
  files:
    - packaged.yaml
cache:
  paths:
    - '/root/.m2/**/*'