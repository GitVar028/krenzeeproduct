AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  krenzeeProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      # SAM will automatically update this URI during deployment
      ImageUri: ""
      # --- ADD THE TAGS HERE ---
      Tags:
        Version: DEV_VERSION
      # -------------------------
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products
            Method: post
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile